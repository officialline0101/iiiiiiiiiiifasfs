<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約フォーム</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <!-- Google Fonts: 明朝体・セリフ体・ゴシック体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Sans+JP:wght@300;400;500;700&family=Shippori+Mincho:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           草津らいん整骨院 ダークラグジュアリーテーマ
           ============================================ */

        /* --- CSS変数（カラースキーム） --- */
        :root {
            --bg-dark: #1a1210;
            --bg-card: rgba(35, 25, 20, 0.85);
            --bg-card-solid: #2a1e18;
            --bg-input: rgba(0, 0, 0, 0.3);
            --text-primary: #f5f0e8;
            --text-secondary: #c4b8a8;
            --text-muted: #8a7e72;
            --accent: #CE5514;
            --accent-hover: #e06020;
            --accent-subtle: rgba(206, 85, 20, 0.15);
            --accent-border: rgba(206, 85, 20, 0.4);
            --border: rgba(245, 240, 232, 0.12);
            --border-strong: rgba(245, 240, 232, 0.22);
            --focus-glow: rgba(206, 85, 20, 0.25);
            --danger: #d44;
            --available: #7fbf7f;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 6px;
            --font-main: 'Klee One', 'Noto Sans JP', serif;
            --font-accent: 'Shippori Mincho', 'Klee One', serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        body {
            font-family: var(--font-main);
            font-weight: 400;
            background: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px 0;
            line-height: 1.85;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 96%;
            max-width: 520px;
            padding: 0 0 36px;
            margin: 0 auto;
            box-shadow: var(--shadow-card);
            animation: fadeIn 0.5s ease;
            overflow: visible;
        }

        /* --- h1 --- */
        h1 {
            font-family: var(--font-accent);
            font-weight: 600;
            color: var(--text-primary);
            background: linear-gradient(180deg, rgba(206,85,20,0.18) 0%, transparent 100%);
            padding: 36px 20px 28px;
            text-align: center;
            margin: 0 0 4px;
            font-size: 22px;
            letter-spacing: 0.18em;
            line-height: 1.7;
            border-bottom: 1px solid var(--border);
            position: relative;
        }
        h1::after {
            content: '';
            display: block;
            width: 36px;
            height: 2px;
            background: var(--accent);
            margin: 18px auto 0;
            border-radius: 1px;
        }

        /* --- 内部パディング共通 --- */
        .label, .labelContent, .visit-buttons, .menu-sections,
        .symptoms, .options, .irradiations, .highlight-background,
        .info-text, .calendar-container, #displayInfo, .submit-button,
        textarea, input[type="text"], input[type="tel"] {
            margin-left: 24px;
            margin-right: 24px;
        }

        /* --- ラベル --- */
        .label {
            display: flex;
            align-items: center;
            margin-bottom: 14px;
            margin-top: 30px;
            padding: 11px 16px;
            font-family: var(--font-accent);
            font-weight: 500;
            font-size: 15px;
            letter-spacing: 0.08em;
            color: var(--text-primary);
            background: var(--accent-subtle);
            border-radius: var(--radius);
            border: none;
            border-left: 3px solid var(--accent);
        }
        .labelContent {
            display: block;
            margin-bottom: 14px;
            margin-top: 30px;
            padding: 11px 16px;
            font-family: var(--font-accent);
            font-weight: 500;
            font-size: 15px;
            letter-spacing: 0.08em;
            color: var(--text-primary);
            background: var(--accent-subtle);
            border-radius: var(--radius);
            text-align: center;
            border: none;
            border-left: 3px solid var(--accent);
        }

        /* --- 必須マーク --- */
        .required {
            color: #fff;
            font-weight: 600;
            font-size: 0.58em;
            margin-left: 10px;
            vertical-align: 0.5em;
            background: var(--accent);
            padding: 2px 7px;
            border-radius: 3px;
            letter-spacing: 0.06em;
        }
        .required-icon {
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary);
            font-size: 0.85em;
            padding: 2px 6px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        /* --- 入力フィールド --- */
        input[type="text"], input[type="tel"], textarea {
            width: calc(100% - 48px);
            padding: 14px 14px;
            margin-bottom: 8px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        input::placeholder, textarea::placeholder {
            color: var(--text-muted);
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--focus-glow);
        }

        /* --- ボタン共通 --- */
        button {
            padding: 13px 16px;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius);
            background: rgba(0,0,0,0.25);
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.25s ease;
            letter-spacing: 0.04em;
        }
        button:hover {
            background: rgba(206,85,20,0.12);
            border-color: var(--accent-border);
        }
        button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
            font-weight: 600;
            box-shadow: 0 2px 12px rgba(206,85,20,0.3);
        }

        /* --- ボタングループ --- */
        .visit-buttons, .menu-sections {
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px;
        }
        .visit-buttons button, .menu-sections button {
            flex: 1; padding: 13px 10px; text-align: center; white-space: nowrap;
        }

        /* --- 症状/メニュー縦並び --- */
        .symptoms, .options { display: block; margin-bottom: 16px; }
        .symptoms button, .options button {
            display: block; width: 100%;
            padding: 15px; margin-bottom: 8px; text-align: center;
        }

        /* --- オプション（横並び） --- */
        .irradiations {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
        }
        .irradiations button {
            flex: 1; min-width: 45%; padding: 13px 8px; text-align: center;
        }

        /* --- ハイライト（オプション見出し） --- */
        .highlight-background {
            cursor: default; background: transparent;
            padding: 16px 10px; margin-top: 24px; margin-bottom: 14px;
            font-family: var(--font-accent); font-size: 14px;
            font-weight: 500; letter-spacing: 0.1em;
            color: var(--text-secondary); text-align: center;
            display: flex; justify-content: center; align-items: center;
        }
        .highlight-background::before, .highlight-background::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-strong), transparent);
        }
        .highlight-background::before { margin-right: 14px; }
        .highlight-background::after { margin-left: 14px; }
        .highlight-text {
            font-weight: 500; color: var(--accent);
            background: var(--accent-subtle);
            padding: 4px 14px; border-radius: 20px; font-size: 13px;
        }

        /* --- インフォテキスト --- */
        .info-text {
            margin-top: 8px; margin-bottom: 16px;
            font-size: 12px; color: var(--text-secondary);
            line-height: 1.8; text-align: center;
            background: rgba(206,85,20,0.08);
            padding: 12px 14px; border-radius: var(--radius);
            border: 1px solid rgba(206,85,20,0.2);
            border-left: 3px solid var(--accent);
        }
        .info-textopop {
            width: 100%; margin: 0 0 10px; font-size: 12px;
            color: var(--text-secondary); line-height: 1.6; text-align: center;
            background: rgba(0,0,0,0.2);
            padding: 10px 12px; border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        #treatment-text {
            background: rgba(206,85,20,0.1);
            padding: 12px 14px; border-radius: var(--radius);
            margin-top: 4px; color: var(--accent);
            border: 1px solid rgba(206,85,20,0.25);
            font-weight: 600;
        }

        /* --- カレンダー --- */
        .calendar-container {
            display: flex; flex-direction: column; align-items: stretch;
            margin-bottom: 24px; position: relative;
            width: calc(100% - 48px);
        }
        .calendar {
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: visible; width: 100%;
        }
        .calendar table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .calendar th, .calendar td {
            font-size: 14px; text-align: center; padding: 3px;
            cursor: pointer; vertical-align: top;
            border: 1px solid var(--border);
            color: var(--text-primary);
            transition: background 0.2s;
        }
        .calendar th:first-child, .calendar td:first-child {
            width: 17%; font-size: 13px; text-align: left;
            padding-left: 6px; color: var(--text-secondary);
        }
        .calendar th {
            background: rgba(206,85,20,0.2);
            font-family: var(--font-accent); font-weight: 500;
            letter-spacing: 0.05em; color: var(--text-primary); padding: 8px 3px;
        }
        .calendar td:hover { background: rgba(206,85,20,0.1); }
        .calendar td.selected {
            background: var(--accent); color: #fff; font-weight: 700;
        }
        .calendar thead th {
            position: sticky; top: 0; z-index: 5;
            background: var(--bg-card-solid);
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
        .available { color: #4ade80; font-weight: 700; background: rgba(74, 222, 128, 0.12); }
        .unavailable { background: rgba(0,0,0,0.35); color: var(--text-muted); }

        /* --- カレンダーナビ --- */
        .week-button-container, .month-button-container {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; margin-bottom: 10px;
        }
        .week-button, .month-button {
            padding: 10px 18px; background: rgba(0,0,0,0.3);
            color: var(--text-primary); border: 1px solid var(--border-strong);
            border-radius: var(--radius); cursor: pointer;
            font-family: var(--font-main); font-size: 13px;
            transition: all 0.25s;
        }
        .week-button:hover, .month-button:hover {
            background: rgba(206,85,20,0.15); border-color: var(--accent-border);
        }
        .week-button:active, .month-button:active { transform: scale(0.97); }
        .current-month {
            font-family: var(--font-accent); font-size: 1.05rem;
            font-weight: 600; color: #fff;
            letter-spacing: 0.08em; text-align: center;
            position: absolute; left: 50%;
            transform: translate(-50%, -10px);
            background: var(--accent);
            padding: 5px 16px; border-radius: 20px;
            box-shadow: 0 3px 12px rgba(206,85,20,0.35);
        }

        /* --- カレンダー内読み込みメッセージ --- */
        .calendar-loading {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            min-height: 200px; width: 100%;
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .calendar-loading .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        .calendar-loading-text {
            margin-top: 14px; font-size: 13px;
            color: var(--text-secondary);
            font-family: var(--font-accent);
            letter-spacing: 0.08em;
        }

        /* --- 送信ボタン --- */
        .submit-button {
            width: calc(100% - 48px); padding: 18px;
            font-size: 16px; font-family: var(--font-accent);
            font-weight: 600; letter-spacing: 0.14em;
            background: var(--accent); color: #fff;
            border: none; border-radius: var(--radius);
            margin-top: 28px; transition: all 0.3s;
            box-shadow: 0 4px 18px rgba(206,85,20,0.35);
        }
        .submit-button:hover {
            background: var(--accent-hover);
            box-shadow: 0 6px 24px rgba(206,85,20,0.4);
            transform: translateY(-2px);
        }
        .submit-button:active { transform: translateY(0); }

        /* --- 予約内容表示 --- */
        #displayInfo {
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius);
            padding: 16px;
            border: 1px solid var(--border);
        }
        .info-row {
            display: flex; justify-content: space-between;
            align-items: center; margin: 6px 0; padding: 4px 0;
        }
        .info-row p { font-size: 13px; line-height: 1.7; color: var(--text-primary); }
        hr { margin: 6px 0; border: none; border-top: 1px solid var(--border); }
        .edit-button {
            background: var(--danger); color: #fff;
            border: none; border-radius: 4px;
            padding: 6px 12px; cursor: pointer;
            transition: all 0.25s; white-space: nowrap;
            width: 80px; text-align: center;
            font-size: 12px; font-weight: 600;
        }
        .edit-button:hover { background: #c33; transform: translateY(-1px); }

        /* --- スピナー --- */
        .loading-spinner {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 9999;
        }
        .loading-spinner-inner {
            text-align: center;
            background: rgba(26,18,16,0.95);
            padding: 40px 44px; border-radius: 10px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }
        .spinner {
            width: 46px; height: 46px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        .loading-text {
            margin-top: 16px; font-size: 14px; font-weight: 400;
            color: var(--text-primary); letter-spacing: 0.08em;
            font-family: var(--font-accent);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- メニューセクション --- */
        .menu-section { display: none; }
        .menu-section.active { display: block; }
        #repairLabel, #repairButtons { display: none; }
        .red-circle { color: var(--available); }
        .bold-cross { font-weight: bold; }

        /* --- サイドナビ --- */
        .side-nav {
            position: fixed; right: 0; top: 80%;
            transform: translateY(-50%);
            background: var(--accent);
            display: flex; flex-direction: column; align-items: center;
            padding: 6px 4px; border-radius: 8px 0 0 8px;
            z-index: 1000; width: 36px;
            box-shadow: -2px 2px 10px rgba(206,85,20,0.3);
        }
        .side-nav a {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #fff; text-decoration: none;
            font-size: 10px; margin: 5px 0; padding: 5px;
            border-radius: 4px; width: 28px; height: 28px;
        }
        .side-nav a:active { transform: scale(1.0); }
        .side-nav a span {
            font-size: 22px; position: absolute; left: 2px; top: 12px;
        }

        /* --- サイドバー --- */
        .sidebar {
            position: fixed; right: 0; top: 50%; transform: translateY(-50%);
            background: rgba(26,18,16,0.95); backdrop-filter: blur(8px);
            padding: 10px; border-radius: var(--radius) 0 0 var(--radius);
            z-index: 1000; border: 1px solid var(--border);
        }
        .sidebar a {
            display: block; padding: 12px; color: var(--text-primary);
            text-decoration: none; text-align: center; font-size: 13px;
            margin-bottom: 8px; background: rgba(0,0,0,0.3);
            border-radius: var(--radius); border: 1px solid var(--border);
            transition: all 0.3s;
        }
        .sidebar a:hover { background: rgba(206,85,20,0.15); }
        .section { padding: 50px 10px; margin-top: 30px; }

        /* --- レスポンシブ --- */
        @media (max-width: 768px) {
            .container { padding: 0 0 28px; }
            .label, .labelContent, .visit-buttons, .menu-sections,
            .symptoms, .options, .irradiations, .highlight-background,
            .info-text, .calendar-container, #displayInfo,
            textarea, input[type="text"], input[type="tel"] {
                margin-left: 16px; margin-right: 16px;
            }
            input[type="text"], input[type="tel"], textarea { width: calc(100% - 32px); }
            .symptoms button, .options button { width: 100%; }
            .calendar-container { width: calc(100% - 32px); }
            .submit-button {
                width: calc(100% - 32px);
                margin-left: 16px; margin-right: 16px;
            }
            h1 { font-size: 20px; letter-spacing: 0.12em; padding: 28px 16px 24px; }
            input, button { font-size: 14px; }
            .info-text, .info-textopop { font-size: 11px; line-height: 1.9; }
        }
        @media (max-width: 600px) {
            .side-nav { width: 30px; }
            .side-nav a { width: 24px; height: 24px; }
            .side-nav a i { font-size: 12px; }
        }
    </style>
</head>

<body>

    <!-- 右側の追従ナビ -->
    <div class="side-nav" id="sideNav">
        <a href="#section-message">
            <span>⇩</span>
            <i class="fas fa-comment"></i>
        </a>
    </div>

    <div class="container">
        <h1>草津らいん整骨院<br>予約フォーム
        </h1>
        <div class="label">お客様名<span class="required">必須</span></div>
        <input type="text" id="name" placeholder="お名前を入力してください" oninput="saveInput('name')">

        <div class="label">電話番号<span class="required">必須</span></div>
        <input type="tel" id="phone" placeholder="電話番号を入力してください" oninput="saveInput('phone')">

        <div class="label">ご来店回数</div>
        <div class="visit-buttons">
            <button type="button" id="firstVisit" onclick="selectVisit(this)">初めての来店</button>
            <button type="button" id="repeatVisit" onclick="selectVisit(this)">2回目以降</button>
        </div>

        <div class="label" id="course">メニューをお選びください</div>
        <div class="info-text">※メニューを選択すると空き状況のカレンダーが表示されます</div>
        <div id="treatment-text" style="display: none; margin-bottom: 10px;"></div>
        <div class="symptoms">
            <button type="button" onclick="selectSymptom(this, 'treatment1')" data-price="15000">もみほぐし60分</button>
            <button type="button" onclick="selectSymptom(this, 'treatment2')" data-price="15000">もみほぐし80分</button>
            <button type="button" onclick="selectSymptom(this, 'treatment2')" data-price="15000">もみほぐし100分</button>
            <button type="button" onclick="selectSymptom(this, 'treatment2')" data-price="15000">もみほぐし120分</button>
        </div>
        <div class="highlight-background">
            <span class="highlight-text">オプション</span>
        </div>
        <div class="irradiations">
            <div class="info-textopop">オプション 2000円（＋所要時間15分）</div>
            <button type="button" id="firstirradiations" onclick="selectirradiations(this)"
                data-price="2000">ヘッドマッサージ</button>
            <button type="button" id="repeatirradiations" onclick="selectirradiations(this)"
                data-price="2000">足つぼマッサージ</button>
            <button type="button" id="sanirradiations" onclick="selectirradiations(this)"
                data-price="2000">ストレッチ</button>
            <button type="button" id="yonirradiations" onclick="selectirradiations(this)"
                data-price="2000">吸い玉カッピング</button>
        </div>

        <div class="label">希望日時<span class="required">必須</span></div>
        <div class="calendar-container">
            <!-- 追従させるバー（ラッパー追加） -->
            <div class="calendar-toolbar">
                <!-- 月を独立して配置 -->
                <div class="current-month-container">
                    <span class="current-month" id="currentMonth">月</span>
                </div>

                <!-- 月移動ボタン -->
                <div class="month-button-container">
                    <button class="month-button" onclick="previousmonth()">前月</button>
                    <button class="month-button" onclick="nextmonth()">翌月</button>
                </div>

                <!-- 週移動ボタン -->
                <div class="week-button-container">
                    <button class="week-button" onclick="previousWeek()">4日前</button>
                    <button class="week-button" onclick="nextWeek()">4日後</button>
                </div>
            </div>

            <div id="calendar1" class="calendar">
                <table>
                    <thead>
                        <tr id="calendar-header">
                            <th>時間</th>
                            <th></th>
                            <th></th>
                            <th></th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody><!-- カレンダーの内容がここに追加される --></tbody>
                </table>
            </div>

        </div>

        <div class="labelContent">メッセージ<br>（質問等お気軽にご記入ください）</div>
        <textarea id="message" rows="4" placeholder="メッセージを入力してください"></textarea>

        <div class="label">ご予約内容</div>
        <div id="displayInfo"></div> <!-- ここに選択された情報を表示します -->

        // スクロール関数

                element.scrollIntoView({ behavior: 'smooth', block: 'center' });

        // 各ボタンや入力フィールドでupdateDisplayInfoを呼び出すようにする
        document.getElementById('name').addEventListener('input', updateDisplayInfo);
        document.querySelectorAll('.visit-buttons button').forEach(button => {
            button.addEventListener('click', updateDisplayInfo);
        });
        document.querySelectorAll('.symptoms button').forEach(button => {
            button.addEventListener('click', updateDisplayInfo);
        });
        document.querySelectorAll('.irradiations button').forEach(button => {
            button.addEventListener('click', updateDisplayInfo);
        });

        // カレンダー表示判定関数（メニューまたはオプションが選択されているか）
        function shouldShowCalendar() {
            const hasMenu = document.querySelectorAll('.symptoms button.active').length > 0;
            const hasOption = document.querySelectorAll('.irradiations button.active').length > 0;
            return hasMenu || hasOption;
        }

        // カレンダーの表示/非表示を制御する関数
        function updateCalendarVisibility() {
            const calendarContainer = document.querySelector('.calendar-container');
            const calendar1 = document.getElementById('calendar1');
            const existingLoading = document.getElementById('calendarLoading');

            if (shouldShowCalendar()) {
                // カレンダーコンテナを表示
                calendarContainer.style.display = 'flex';

                if (dataLoaded) {
                    // データ読み込み済み → カレンダーを表示、読み込みメッセージを削除
                    calendar1.style.display = 'block';
                    if (existingLoading) existingLoading.remove();
                    pendingCalendarShow = false;
                } else {
                    // データ未読み込み → カレンダーを隠して読み込みメッセージを表示
                    calendar1.style.display = 'none';
                    pendingCalendarShow = true;
                    if (!existingLoading) {
                        const loadingDiv = document.createElement('div');
                        loadingDiv.id = 'calendarLoading';
                        loadingDiv.className = 'calendar-loading';
                        loadingDiv.innerHTML = '<div class="spinner"></div><div class="calendar-loading-text">読み込み中...</div>';
                        calendar1.parentNode.insertBefore(loadingDiv, calendar1);
                    }
                }
            } else {
                // メニュー/オプションが未選択 → カレンダーを非表示
                calendarContainer.style.display = 'none';
                pendingCalendarShow = false;
                if (existingLoading) existingLoading.remove();
                calendar1.style.display = 'block';
            }
        }

        document.querySelectorAll('.symptoms button').forEach(button => {
            button.addEventListener('click', () => {
                updateCalendarVisibility();
            });
        });

        // 初期状態でカレンダーを非表示にする
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelector('.calendar-container').style.display = 'none';
        });

        // 日付セルのクリックイベントで希望日時を更新
        document.querySelectorAll('.calendar td').forEach(cell => {
            cell.addEventListener('click', () => {
                selectDate(cell);
                updateDisplayInfo();  // 日付を選択したら即座に表示を更新
            });
        });

        function selectSymptom(button, treatmentId) {
            // 選択された日時をリセット
            selectedFullDate = '';

            // 現在の状態を記録（切り替え検知用）
            const wasActive = button.classList.contains('active');

            // ボタンの選択状態を切り替える
            button.classList.toggle('active');

            // 選択されたオプションを取得
            const updatedSelectedButtons = document.querySelectorAll('.symptoms button.active');

            // メニュー時間と価格をリセット
            selectedMenuTime = 0;
            selectedSymptom = [];
            menuPrice = 0;

            if (updatedSelectedButtons.length === 0) {
                // すべてのボタンの選択が解除された場合
                selectedMenuTime = 0;
                selectedSymptom = null;
                menuPrice = 0;
            } else {
                // 1つだけ選択状態にする
                if (updatedSelectedButtons.length > 1) {
                    updatedSelectedButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');
                }

                // 選択されたメニュー情報を格納
                const selectedMenu = button.textContent;
                selectedMenuTime = menuTimes[selectedMenu] || 0;
                selectedSymptom = [selectedMenu];
                // 来店回数に応じた料金を設定
                if (visitCount && menuPrices[visitCount]) {
                    menuPrice = menuPrices[visitCount][selectedMenu] || 0;
                } else {
                    menuPrice = 0;
                }
            }

            console.log('選択されたメニューの時間:', selectedMenuTime);

            // --- メニュー詳細を来店回数に応じて即時表示 ---
            const treatmentText = document.getElementById('treatment-text');
            const menuName = button.textContent;
            let priceDisplay = '';
            if (visitCount && menuPrices[visitCount] && menuPrices[visitCount][menuName]) {
                priceDisplay = `¥${menuPrices[visitCount][menuName].toLocaleString()}`;
            } else {
                // 来店回数未選択の場合は両方の料金を表示
                const firstPrice = menuPrices['初めての来店'][menuName];
                const repeatPrice = menuPrices['2回目以降'][menuName];
                if (firstPrice && repeatPrice) {
                    priceDisplay = `初回 ¥${firstPrice.toLocaleString()} ／ 2回目以降 ¥${repeatPrice.toLocaleString()}`;
                }

            if (button.classList.contains('active')) {
                treatmentText.innerHTML = `<div style="text-align: left;"><strong>${priceDisplay}</strong></div>`;

            // `treatment-text` を選択されたボタンの直後に移動

            // トリートメントテキストを表示

            // 選択されたメニューの名前と価格を取得

            // ✅ カレンダー表示の条件判定

        function selectirradiations(button) {
            // 選択された日時をリセット
            selectedFullDate = '';

            // ボタンの選択状態を切り替える

            // 選択されたオプションを取得

            selectedButtons.forEach(btn => {

            updateDisplayInfo(); // 表示を更新

        function selectVisit(element) {
            // すでに選択されている場合は選択解除する
            if (element.classList.contains('active')) {
                element.classList.remove('active');
                visitCount = '';
                selectedVisitTime = 0;
                selectedFullDate = '';

            }

            // 他のボタンの選択解除

                    menuPrice = menuPrices[visitCount][currentMenu];
                }

        function selectDate(cell) {
            // "unavailable" クラスが付いている場合はクリックを無効化
            if (cell.classList.contains('unavailable')) {
                return; // 何もせずに終了
            }

            // 既に選択されているセルの選択を解除
            const cells = document.querySelectorAll('.calendar td');
            cells.forEach(td => td.classList.remove('selected'));

            // 新しいセルを選択状態にする
            cell.classList.add('selected');

            // 選択された日付と時間を取得
            const selectedDay = cell.getAttribute('data-date'); // ISO形式の日付
            const selectedTime = cell.parentElement.firstChild.textContent; // 時間
            const date = new Date(selectedDay);

            // 日付部分を「○○年○○月○○日 ○○:○○」形式に変換
            selectedFullDate = `${date.getFullYear()}年${('0' + (date.getMonth() + 1)).slice(-2)}月${('0' + date.getDate()).slice(-2)}日 ${selectedTime}`;

            // 希望日時を即座に更新
            updateDisplayInfo();
        }

        async function checkCalendarAvailability(selectedFullDate) {
            if (!selectedFullDate) return false;

            const urlBase = 'https://script.google.com/macros/s/AKfycbyEnDg7ywElyLmhGMo-qWOJX4NSQ2_SkCNJwBv_gAkdBXTPGUP7ljeQmrMScIdzS9k_1Q/exec';

            try {
                const targetDate = new Date(selectedFullDate.replace(/[年月]/g, '/').replace('日', ''));
                if (isNaN(targetDate.getTime())) {
                    alert('日時の形式が不正です。');
                    return false;
                }

                const totalMinutes = (selectedMenuTime || 0) + (selectedirradiationsTime || 0) + (selectedVisitTime || 0);
                const startTime = new Date(targetDate);
                const endTime = new Date(targetDate);
                endTime.setMinutes(endTime.getMinutes() + totalMinutes);

                const startOfDay = new Date(targetDate);
                startOfDay.setHours(0, 0, 0, 0);
                const endOfDay = new Date(targetDate);
                endOfDay.setHours(23, 59, 59, 999);

                const url = `${urlBase}?startTime=${startOfDay.toISOString()}&endTime=${endOfDay.toISOString()}`;
                const response = await fetch(url);
                const data = await response.json();

                const relevantEvents = data.filter(e => e.title !== "営業日");

                let maxOverlap = 0;
                for (let t = new Date(startTime); t < endTime; t.setMinutes(t.getMinutes() + 1)) {
                    let overlapping = 1;
                    relevantEvents.forEach(e => {
                        const evStart = new Date(e.startTime);
                        const evEnd = new Date(e.endTime);
                        if (t >= evStart && t < evEnd) overlapping++;
                    });
                    if (overlapping > maxOverlap) maxOverlap = overlapping;
                    if (maxOverlap >= 3) break;
                }

                console.log(`重複最大数: ${maxOverlap}件`);
                return maxOverlap < 3;

            } catch (err) {
                console.error('カレンダー確認エラー:', err);
                alert('予約状況の確認に失敗しました。時間をおいて再度お試しください。');
                return false;
            }
        }

        async function submitForm() {
            // ✅ スピナー表示を確実に反映（描画の1フレーム待つ）
            showLoadingSpinner();
            await new Promise(resolve => requestAnimationFrame(resolve));

            const formData = {
                name: document.getElementById('name').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                visitCount: visitCount,
                selectedSymptom: selectedSymptom && selectedSymptom.length > 0 ? selectedSymptom : null,
                irradiationsCount: irradiationsCount,
                dates: selectedFullDate ? [selectedFullDate] : null,
                message: document.getElementById('message').value.trim()
            };

            // ✅ 入力チェック（ここでもスピナー維持）
            if (!formData.name || !formData.phone || !formData.selectedSymptom || !formData.dates) {
                setTimeout(hideLoadingSpinner, 800);
                if (!formData.name) { alert('お名前を入力してください。'); return; }
                if (!formData.phone) { alert('電話番号を入力してください。'); return; }
                if (!formData.selectedSymptom) { alert('メニューを選択してください。'); return; }
                if (!formData.dates) { alert('希望日時を選択してください。'); return; }
            }

            // ✅ カレンダー空き状況チェック
            const available = await checkCalendarAvailability(formData.dates[0]);

            if (!available) {
                alert('予約が埋まりました。別の日時をお選びください。');
                availabilityCache = {};
                await fetchAvailability(currentDate);
                setTimeout(hideLoadingSpinner, 1000);
                return;
            }

            // ✅ irradiationsCountがあるときだけ文に含める
            const menuText = formData.irradiationsCount
                ? `${formData.selectedSymptom},${formData.irradiationsCount}`
                : `${formData.selectedSymptom}`;

            // ✅ メッセージ送信処理
            try {
                await liff.sendMessages([{
                    type: 'text',
                    text: `【予約フォーム】\nお名前：${formData.name}\n電話番号：${formData.phone}\nご来店回数：${formData.visitCount}\nメニュー：${menuText}\n希望日時：\n ${formData.dates[0]}\nメッセージ：${formData.message}`
                }]);

                alert('当日キャンセルは無いようにお願いいたします。');

                // ✅ スピナーを少し残してから閉じる
                setTimeout(() => {
                    hideLoadingSpinner();
                    liff.closeWindow();
                }, 1000);
            } catch (err) {
                console.error('メッセージ送信エラー:', err);
                alert('メッセージの送信に失敗しました。');
                setTimeout(hideLoadingSpinner, 1000);
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return `${date.getFullYear()}年${('0' + (date.getMonth() + 1)).slice(-2)}月${('0' + date.getDate()).slice(-2)}日 ${('0' + date.getHours()).slice(-2)}:${('0' + date.getMinutes()).slice(-2)}`;
        }

        // ✅ キャッシュからカレンダーを即時再描画する関数（GAS通信なし）
        function redrawFromCache() {
            const startTime = new Date(currentDate);
            const endTime = new Date(currentDate);
            endTime.setDate(endTime.getDate() + 7);
            const cacheKey = startTime.toISOString() + endTime.toISOString();

            if (availabilityCache[cacheKey]) {
                // キャッシュがあれば通信なしで即時再描画
                console.log('キャッシュから即時再描画');
                updateCalendar(availabilityCache[cacheKey].availability, availabilityCache[cacheKey].businessDays);
            } else {
                // キャッシュが無い場合のみフェッチ（フォールバック）
                console.log('キャッシュなし → フェッチ実行');
                fetchAvailability(currentDate);
            }
        }

        async function fetchAvailability(date, forceReload = false) {
            const startTime = new Date(date);
            const endTime = new Date(date);
            endTime.setDate(endTime.getDate() + 7);

            const cacheKey = startTime.toISOString() + endTime.toISOString();

            // ✅ キャッシュを使う条件を変更（forceReloadがfalseのときのみ）
            if (!forceReload && availabilityCache[cacheKey]) {
                console.log('Using cached data');
                updateCalendar(availabilityCache[cacheKey].availability, availabilityCache[cacheKey].businessDays);
                return;
            }

            const url =
                'https://script.google.com/macros/s/AKfycbyEnDg7ywElyLmhGMo-qWOJX4NSQ2_SkCNJwBv_gAkdBXTPGUP7ljeQmrMScIdzS9k_1Q/exec' +
                `?startTime=${startTime.toISOString()}&endTime=${endTime.toISOString()}`;

            try {
                showLoadingSpinner();
                const response = await fetch(url);
                const data = await response.json();
                console.log('Fetched fresh data');

                const businessDays = data
                    .filter(event => event.summary === '営業日')
                    .map(event => ({
                        start: new Date(event.startTime),
                        end: new Date(event.endTime),
                    }));

                availabilityCache[cacheKey] = { availability: data, businessDays: businessDays };
                updateCalendar(data, businessDays);

                // ✅ データ読み込み完了フラグを設定
                dataLoaded = true;

                // ✅ 読み込み待ちのカレンダー表示リクエストがあれば表示（読み込みメッセージも削除）
                if (pendingCalendarShow && shouldShowCalendar()) {
                    updateCalendarVisibility();
                }
            } catch (error) {
                console.error('Error fetching availability:', error);
                // ✅ エラー時でもカレンダー表示をブロックしない
                dataLoaded = true;
                if (pendingCalendarShow && shouldShowCalendar()) {
                    updateCalendarVisibility();
                }
            } finally {
                hideLoadingSpinner();
            }
        }

        function updateCalendar(availability, businessDays) {
            const calendar = document.getElementById('calendar1');
            const table = calendar.querySelector('table tbody');

            const times = [
                '10:00', '10:15', '10:30', '10:45',
                '11:00', '11:15', '11:30', '11:45',
                '12:00', '12:15', '12:30', '12:45',
                '13:00', '13:15', '13:30', '13:45',
                '14:00', '14:15', '14:30', '14:45',
                '15:00', '15:15', '15:30', '15:45',
                '16:00', '16:15', '16:30', '16:45',
                '17:00', '17:15', '17:30', '17:45',
                '18:00', '18:15', '18:30', '18:45',
                '19:00'
            ];

            if (table.rows.length === 0) {
                for (const time of times) {
                    const row = document.createElement('tr');
                    const timeCell = document.createElement('td');
                    timeCell.textContent = time;
                    row.appendChild(timeCell);

                    for (let i = 0; i < 4; i++) {
                        const cell = document.createElement('td');
                        cell.addEventListener('click', () => selectDate(cell));
                        row.appendChild(cell);
                    }

                    table.appendChild(row);
                }
            }

            // テーブルのヘッダーを更新
            updateCalendarHeader(currentDate);

            // 各セルを空白にリセットし、クラスもリセット
            for (let row of table.rows) {
                for (let i = 1; i < row.cells.length; i++) {
                    row.cells[i].textContent = '';
                    row.cells[i].removeAttribute('data-date');
                    row.cells[i].classList.remove('available', 'unavailable', 'selected');
                }
            }

            // 現在の日時を取得
            const now = new Date();

            // テーブルの内容を1週間分ループで更新
            for (let i = 0; i < 7; i++) {
                const day = new Date(currentDate);
                day.setDate(day.getDate() + i); // 指定日のi日後

                let businessEventTimes = []; // 営業日のイベント時間帯を格納する配列

                // availabilityの中から営業日イベントを抽出して格納
                availability.forEach(slot => {
                    const eventStart = new Date(slot.startTime);
                    const eventEnd = new Date(slot.endTime);
                    if (eventStart.toDateString() === day.toDateString() && slot.title === "営業日") {
                        businessEventTimes.push({ start: eventStart, end: eventEnd });
                    }
                });

                // 各時間帯（例：10:00, 10:30, ...）に対して処理
                for (let j = 0; j < times.length; j++) {
                    const cell = table.rows[j].cells[i + 1]; // テーブルの該当セル取得

                    // すでに✕が入っていたらスキップ
                    if (cell.textContent === '✕') {
                        continue;
                    }

                    // スロットの開始時間設定
                    const slotStart = new Date(day);
                    slotStart.setHours(parseInt(times[j].split(':')[0]), parseInt(times[j].split(':')[1]), 0, 0);

                    // スロットの終了時間をメニュー合計時間で算出
                    const slotEnd = new Date(slotStart);
                    let menuDuration = selectedMenuTime || 0;
                    let visitDuration = selectedVisitTime || 0;
                    let irradiationsDuration = selectedirradiationsTime || 0;
                    slotEnd.setMinutes(slotStart.getMinutes() + menuDuration + visitDuration + irradiationsDuration);

                    // ⭐ 当日より前のすべての日は ✕ にする
                    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                    const compareDay = new Date(day.getFullYear(), day.getMonth(), day.getDate());
                    if (compareDay < today) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                        continue;
                    }

                    // 日をまたぐ場合は利用不可
                    if (slotEnd.getDate() !== slotStart.getDate()) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                        continue;
                    }

                    // 通常曜日（木曜以外）：20時以降に終了する場合は✕
                    if ([0, 1, 2, 4, 5, 6].includes(slotEnd.getDay())) {
                        if (slotEnd.getHours() === 20 && slotEnd.getMinutes() > 0 || slotEnd.getHours() > 20) {
                            cell.textContent = '✕';
                            cell.classList.add('unavailable');
                            continue;
                        }
                    }

                    // 木曜日のみ：22時以降に終了する場合は✕
                    if ([3].includes(slotEnd.getDay())) {
                        if (slotEnd.getHours() === 20 && slotEnd.getMinutes() > 0 || slotEnd.getHours() > 20) {
                            cell.textContent = '✕';
                            cell.classList.add('unavailable');
                            continue;
                        }
                    }

                    // ⭐ 当日の場合、現在時刻より前の時間帯は✕
                    if (i === 0 && slotStart < now) {
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                        continue;
                    }

                    // 指定時間帯が営業日内かを判定
                    const isBusinessDay = businessDays.some(businessDay => {
                        const businessDayStart = new Date(businessDay.start);
                        const businessDayEnd = new Date(businessDay.end);
                        return slotStart >= businessDayStart && slotEnd <= businessDayEnd;
                    });

                    // 営業イベントと時間帯が重なっているかを判定
                    const isBusinessEventTime = businessEventTimes.some(event => {
                        return slotStart < event.end && event.start < slotEnd;
                    });

                    let overLimit = false;

                    const relevantEvents = availability.filter(slot => {
                        const eventStart = new Date(slot.startTime);
                        const eventEnd = new Date(slot.endTime);
                        return slot.title !== "営業日" && eventStart < slotEnd && eventEnd > slotStart;
                    });

                    for (let checkTime = new Date(slotStart.getTime()); checkTime < slotEnd; checkTime.setMinutes(checkTime.getMinutes() + 1)) {
                        let overlapping = 1; // 仮予約1件分を初めからカウント

                        relevantEvents.forEach(slot => {
                            const eventStart = new Date(slot.startTime);
                            const eventEnd = new Date(slot.endTime);
                            if (eventStart <= checkTime && eventEnd > checkTime) {
                                overlapping++;
                            }
                        });

                        if (overlapping >= 3) {
                            overLimit = true;
                            break;
                        }
                    }

                    // ⭐ 利用可否の最終判断（◯ or ✕）を決定するロジック
                    if (isBusinessEventTime) {
                        // 営業イベント中で上限オーバー → ✕／それ以外 → ◯
                        if (overLimit) {
                            cell.textContent = '✕';
                            cell.classList.add('unavailable');
                        } else {
                            cell.textContent = '◯';
                            cell.classList.add('available');
                        }
                    } else if (businessEventTimes.length > 0) {
                        // 当日に営業イベントがあるが、時間外 → ✕
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                    } else if (isBusinessDay && !overLimit) {
                        // 通常の営業日で上限未満 → ◯
                        cell.textContent = '◯';
                        cell.classList.add('available');
                    } else if (!overLimit) {
                        // 営業日でなくても上限未満なら → ◯
                        cell.textContent = '◯';
                        cell.classList.add('available');
                    } else {
                        // その他（上限オーバー） → ✕
                        cell.textContent = '✕';
                        cell.classList.add('unavailable');
                    }

                    // セルにこの時間帯のデータ属性を追加（ISO形式の日時）
                    cell.setAttribute('data-date', slotStart.toISOString());
                }
            }
        }

        // 追加（スクリプトの上部どこでもOK）
        let spinnerDelayTimer = null;

        function nextmonth() {
            showLoadingSpinner();
            availabilityCache = {}; // ✅ キャッシュクリア
            currentDate.setMonth(currentDate.getMonth() + 1);
            currentDate.setDate(1);
            fetchAvailability(currentDate, true); // ✅ 強制再読み込み
        }

        function previousmonth() {
            showLoadingSpinner();
            availabilityCache = {}; // ✅ キャッシュクリア
            currentDate.setMonth(currentDate.getMonth() - 1);
            currentDate.setDate(1);
            fetchAvailability(currentDate, true);
        }

        function nextWeek() {
            showLoadingSpinner();
            availabilityCache = {}; // ✅ キャッシュクリア
            currentDate.setDate(currentDate.getDate() + 4);
            fetchAvailability(currentDate, true);
        }

        function previousWeek() {
            showLoadingSpinner();
            availabilityCache = {}; // ✅ キャッシュクリア
            currentDate.setDate(currentDate.getDate() - 4);
            fetchAvailability(currentDate, true);
        }

        // 🔹 初回ロード判定用フラグ
        let isInitialLoad = true;

        function showLoadingSpinner() {
            const spinner = document.getElementById('loadingSpinner');
            if (!spinner) return;

            // ✅ 初回ロード時はスピナーを表示せず、操作も無効化しない
            if (isInitialLoad) {
                return;
            }

            // 2回目以降はスピナーを表示
            spinner.style.display = 'flex';
            disableAllInteractiveElements(true);
        }

        function hideLoadingSpinner() {
            const spinner = document.getElementById('loadingSpinner');
            if (!spinner) return;

            // ✅ スピナーを1秒遅れて消す
            setTimeout(() => {
                spinner.style.display = 'none';
                disableAllInteractiveElements(false);

                // ✅ 初回ロード終了後は以降すべて通常扱い
                isInitialLoad = false;
            }, 1000); // ← ここで1秒遅らせる
        }

        // ✅ 共通：全ボタン・カレンダーセルなどを一括制御
        function disableAllInteractiveElements(disabled) {
            const buttons = document.querySelectorAll('button');
            const inputs = document.querySelectorAll('input, textarea');
            const calendarCells = document.querySelectorAll('.calendar td');

            buttons.forEach(btn => btn.disabled = disabled);
            inputs.forEach(input => input.disabled = disabled);
            calendarCells.forEach(cell => {
                if (disabled) {
                    cell.style.pointerEvents = 'none';
                    cell.style.opacity = '0.5';
                } else {
                    cell.style.pointerEvents = 'auto';
                    cell.style.opacity = '';
                }
            });

            // スピナー中は全体クリック不可にするが、
            // スピナー自体だけは操作可（表示の邪魔をしないため）
            document.body.style.pointerEvents = disabled ? 'none' : 'auto';
            const spinner = document.getElementById('loadingSpinner');
            if (spinner) spinner.style.pointerEvents = 'auto';
        }
